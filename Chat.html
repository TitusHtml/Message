<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Private Chat – Titus & Friend</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #0084ff;
      color: white;
      padding: 14px 16px;
      text-align: center;
      font-weight: 600;
      font-size: 19px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 18px;
      line-height: 1.4;
      position: relative;
      word-wrap: break-word;
    }
    .msg.sent {
      align-self: flex-end;
      background: #11ff00;
      color: rgb(0, 0, 0);
      border-bottom-right-radius: 4px;
    }
    .msg.received {
      align-self: flex-start;
      background: rgb(88, 147, 234);
      color: black;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .msg .name {
      font-weight: 600;
      font-size: 13px;
      opacity: 0.9;
      margin-bottom: 3px;
      display: block;
    }
    .msg .time {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 4px;
      display: block;
      text-align: right;
    }
    #input-area {
      display: flex;
      padding: 12px 16px;
      background: white;
      border-top: 1px solid #ddd;
      gap: 10px;
    }
    #name {
      width: 110px;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 20px;
      font-size: 15px;
    }
    #message {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #ccc;
      border-radius: 20px;
      font-size: 15px;
      outline: none;
    }
    button {
      background: #0084ff;
      color: white;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
    }
    button:hover { background: #0073e6; }
    #status {
      text-align: center;
      padding: 8px;
      font-size: 13px;
      color: #555;
      background: #fff9e6;
      border-bottom: 1px solid #ffe8a3;
    }
  </style>
</head>
<body>

  <header>Private Chat</header>

  <div id="status">Both need this page open to see messages • Works best on same Wi-Fi</div>

  <div id="messages"></div>

  <div id="input-area">
    <input id="name" placeholder="Your name" value="Titus" />
    <input id="message" placeholder="Type a message…" autocomplete="off" />
    <button id="send">➤</button>
  </div>

  <script>
    const channel = new BroadcastChannel('private-chat-channel');

    const messagesDiv = document.getElementById('messages');
    const nameInput   = document.getElementById('name');
    const msgInput    = document.getElementById('message');
    const sendBtn     = document.getElementById('send');

    function addMessage(name, text, isSent = false) {
      const div = document.createElement('div');
      div.className = `msg ${isSent ? 'sent' : 'received'}`;

      const nameEl = document.createElement('span');
      nameEl.className = 'name';
      nameEl.textContent = name || 'Anonymous';

      const textEl = document.createTextNode(text);

      const timeEl = document.createElement('span');
      timeEl.className = 'time';
      timeEl.textContent = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

      div.appendChild(nameEl);
      div.appendChild(textEl);
      div.appendChild(timeEl);

      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Receive messages from the other person
    channel.onmessage = (e) => {
      const { name, text } = e.data;
      addMessage(name, text, false);
    };

    // Send message
    function send() {
      const text = msgInput.value.trim();
      if (!text) return;

      const name = nameInput.value.trim() || 'Anonymous';

      channel.postMessage({ name, text });
      addMessage(name, text, true);   // show it to yourself too

      msgInput.value = '';
      msgInput.focus();
    }

    sendBtn.onclick = send;

    msgInput.addEventListener('keypress', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        send();
      }
    });

    // Optional: welcome message
    addMessage('', "Chat started. Your friend needs to open this page too.", false);
  </script>

</body>
</html>
